        // convert to number

        function num(v) {
            if (v === undefined || v === null || String(v).trim() === "") {
                return NaN; // force skip invalid rows
            }
            return Number(String(v).trim());
        }


        // find index
        function findIndex(keyword) {
            return headers.findIndex(h => {
                let clean = h.trim().toLowerCase();

                if (keyword === "time") return clean === "time";
                if (keyword === "timestamp") return clean === "timestamp";

                return clean.includes(keyword);
            });
        }


        // load sheet
        async function loadSheet() {
            let res = await fetch(sheetURL);
            let text = await res.text();

            let rows = text.trim().split("\n");

            headers = rows[0].split(",");


            // find columns
            console.log(headers);
            idxTimestamp = findIndex("timestamp");
            idxGive = findIndex("give");
            idxReceive = findIndex("receive");
            idxPaid = findIndex("paid");
            idxResult = findIndex("result");
            idxTime = findIndex("time");
            console.log("Give", idxGive);
            console.log("Time", idxTime);


            createHeader();

            for (let i = 1; i < rows.length; i++) {

                let cols = rows[i].split(",");

                tableData.push(cols);

                addRow(cols, i);

            }

            createSearch();

        }


        // header (skip timestamp)
        function createHeader() {

            let h = document.getElementById("head");

            let newHeaders = headers.filter((h, i) => i !== idxTimestamp);

            h.innerHTML = "<tr><th>#</th>" +
                newHeaders.map(x => `<th>${x}</th>`).join("") +
                "</tr>";

        }


        // add rows (skip timestamp)
        function addRow(cols, index) {

            let tr = document.createElement("tr");

            let numTd = document.createElement("td");
            numTd.textContent = index;
            numTd.className = "rowNum";

            tr.appendChild(numTd);


            cols.forEach((c, i) => {

                if (i === idxTimestamp) return;

                let td = document.createElement("td");
                td.textContent = c;

                tr.appendChild(td);

            });

            document.getElementById("body").appendChild(tr);

        }


        // search inputs
        function createSearch() {

            let f = document.getElementById("searchForm");

            f.innerHTML = "";

            ["Give", "Receive", "Paid", "Result"]
                .forEach(n => {

                    let i = document.createElement("input");

                    i.id = "s" + n;
                    i.placeholder = n;

                    f.appendChild(i);

                });

            let b = document.createElement("button");

            b.type = "button";
            b.textContent = "Search";
            b.onclick = search;

            f.appendChild(b);

            let resetBtn = document.createElement("button");
            resetBtn.type = "button";
            resetBtn.textContent = "Reset";

            resetBtn.onclick = () => {

                // 🔹 1. Clear all input fields
                document.getElementById("sGive").value = "";
                document.getElementById("sReceive").value = "";
                document.getElementById("sPaid").value = "";
                document.getElementById("sResult").value = "";

                // 🔹 2. Show all rows again
                document.querySelectorAll("#body tr").forEach(r => {
                    r.style.display = "";

                    // 🔹 3. Remove all highlights
                    r.classList.remove("selected-row", "chain-row");
                });

            };

            f.appendChild(resetBtn);

        }

        function search() {

            let give = num(document.getElementById("sGive").value);
            let receive = num(document.getElementById("sReceive").value);
            let paid = num(document.getElementById("sPaid").value);
            let result = num(document.getElementById("sResult").value);

            if (
                isNaN(give) ||
                isNaN(receive) ||
                isNaN(paid) ||
                isNaN(result)
            ) {
                alert("Enter all numbers");
                return;
            }

            let gap1 = receive - give;
            let gap2 = paid - receive;
            let gap3 = result - paid;

            let rows = document.querySelectorAll("#body tr");

            // 🔹 Reset all rows
            rows.forEach(r => {
                r.style.display = "none";
                r.classList.remove("selected-row", "chain-row");
            });

            tableData.forEach((row, i) => {

                let g = num(row[idxGive]);
                let r = num(row[idxReceive]);
                let p = num(row[idxPaid]);
                let re = num(row[idxResult]);

                if (
                    isNaN(g) ||
                    isNaN(r) ||
                    isNaN(p) ||
                    isNaN(re)
                ) return;

                let d1 = r - g;
                let d2 = p - r;
                let d3 = re - p;

                // ✅ MATCH FOUND
                if (d1 === gap1 && d2 === gap2 && d3 === gap3) {

                    // show matched row
                    rows[i].style.display = "";
                    rows[i].classList.add("selected-row");

                    // 🔥 Show next 3 rows
                    for (let j = i + 1; j <= i + 3 && j < rows.length; j++) {
                        rows[j].style.display = "";
                        rows[j].classList.add("chain-row");
                    }
                }

            });
        }
